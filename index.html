<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="index.css" />
        <script src="index.js" defer></script>
    </head>

    <body>
        <header class="header_container">
            <h1 class="header_title">Rock Paper Scissors</h1>
            <p class="subtitle">Best of 3 wins!</p>
        </header>

        <div class="result_container">
            <h3 class="result_title">Result</h3>
            <p class="result_txt">-</p>
        </div>
        
        <!-- score -->
        <div class="score_container">
            <p class="user"> User: <span class="user_score">0</span></p>
            <p class="comp"> Computer: <span class="comp_score">0</span></p>
            <p class="tie"> Ties: <span class="tie_score">0</span></p>
        </div>

        <!-- choice -->
        <div class="choice_container">
            <p> User: <span class="user_choice">?</span></p>
            <p> Computer: <span class="comp_choice">?</span></p>
        </div>


        <div class="btn_container">
            <button class="btn rock">Rock</button>
            <button class="btn paper">Paper</button>
            <button class="btn scissors">Scissors</button>
        </div>
        <div class="restart_container">
        <button class="restart_btn">Restart Game!</button>
    </div>
    </body>
</html>
